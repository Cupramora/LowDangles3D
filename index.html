<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LowDangles3D</title>

    <!-- 3D Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --neon-cyan: #00f6ff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffe066;
            --bg-deep: #050308;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: #e6e6e6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, #2b0b45 0, transparent 40%),
                radial-gradient(circle at 80% 10%, #0b3b5f 0, transparent 45%),
                radial-gradient(circle at 20% 80%, #5f0b3b 0, transparent 45%),
                linear-gradient(135deg, #050308 0, #050308 40%, #0a0b1a 100%);
            mix-blend-mode: screen;
            opacity: 0.8;
            z-index: -3;
        }

        .city-layer { position: fixed; inset: 0; pointer-events: none; z-index: -2; opacity: 0.35; }
        .city-block {
            position: absolute;
            background: linear-gradient(to top, rgba(0,0,0,.9), rgba(0,246,255,.2));
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,246,255,.4), 0 0 25px rgba(255,0,255,.3);
            transform-origin: bottom;
            animation: city-float 12s ease-in-out infinite alternate;
        }
        @keyframes city-float {
            0% { transform: translateY(0) skewX(-6deg); }
            100% { transform: translateY(-10px) skewX(-3deg); }
        }

        .scanlines {
            position: fixed; inset: 0; pointer-events: none;
            background-image: linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 100% 2px;
            mix-blend-mode: soft-light; opacity: 0.25; z-index: -1;
            animation: scan-flicker 3s linear infinite;
        }
        @keyframes scan-flicker { 0%,100% { opacity:.25 } 50% { opacity:.35 } }

        .glitch-noise {
            position: fixed; inset: 0; pointer-events: none;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 2px, transparent 2px, transparent 4px);
            mix-blend-mode: overlay; opacity: .18; z-index: -1;
        }

        /* ===== MODAL ===== */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content {
            background: radial-gradient(circle at top, rgba(0,246,255,.15), #020208 60%);
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0,246,255,.6);
        }
        .modal-title { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 20px; }
        .modal-group { margin-bottom: 15px; }
        .modal-label { color: var(--neon-yellow); font-size: .9rem; margin-bottom: 5px; display: block; }
        .modal-input {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0,20,30,.9); color: var(--neon-cyan);
            box-sizing: border-box; outline: none;
        }
        .modal-input:focus { box-shadow: 0 0 15px rgba(0,246,255,.4) inset; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px; transition: all .2s; }
        .modal-btn.save { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .modal-btn.save:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--neon-cyan); }
        .modal-btn.close { background: #111; color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,246,255,.6); }
        .modal-btn.close:hover { transform: translateY(-2px); }

        /* Add-files drop area inside edit modal */
        #editAddDrop {
            margin-top: 8px;
            padding: 14px;
            border: 2px dashed var(--neon-magenta);
            border-radius: 8px;
            text-align: center;
            color: var(--neon-magenta);
            background: rgba(255,0,255,.05);
            cursor: pointer;
            font-size: .85rem;
            transition: background .15s, box-shadow .15s;
        }
        #editAddDrop.dragover {
            background: rgba(255,0,255,.18);
            box-shadow: 0 0 18px rgba(255,0,255,.5);
        }

        /* ===== SUGGESTIONS BOX ===== */
        .suggestions-floating {
            position: fixed; top: 20px; left: 20px;
            background: rgba(5,5,20,.7);
            border-radius: 8px; padding: 12px;
            box-shadow: 0 0 10px rgba(0,246,255,.2);
            backdrop-filter: blur(8px);
            z-index: 9; max-width: 280px;
            border: 1px solid rgba(0,246,255,.15);
        }
        .suggestions-floating.collapsed { padding: 8px 12px; }
        .suggestions-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 8px; }
        .suggestions-toggle.collapsed { margin-bottom: 0; }
        .suggestions-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--neon-yellow); }
        .suggestions-expand { font-size: .8rem; color: var(--neon-cyan); }
        .suggestions-content { display: block; }
        .suggestions-content.hidden { display: none; }
        .suggestion-input-group { display: flex; gap: 6px; margin-bottom: 8px; }
        #suggestion-text {
            flex: 1; padding: 6px; border-radius: 4px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0,20,30,.8); color: var(--neon-cyan);
            font-size: .8rem; box-shadow: 0 0 8px rgba(0,246,255,.15) inset; outline: none;
        }
        #submit-suggestion {
            padding: 6px 10px; border-radius: 4px; border: none;
            background: var(--neon-magenta); color: #000; font-weight: bold;
            font-size: .75rem; cursor: pointer;
            box-shadow: 0 0 10px var(--neon-magenta); transition: all .2s;
        }
        #submit-suggestion:hover { transform: translateY(-1px); box-shadow: 0 0 15px var(--neon-magenta); }
        .suggestions-archive {
            max-height: 150px; overflow-y: auto;
            border: 1px solid rgba(0,246,255,.15);
            border-radius: 4px; padding: 6px;
            background: rgba(0,0,0,.5); font-size: .75rem;
        }
        .suggestion-item { padding: 4px; margin-bottom: 4px; border-left: 1px solid var(--neon-cyan); background: rgba(0,246,255,.03); border-radius: 2px; line-height: 1.3; }
        .suggestion-text { color: var(--neon-cyan); margin-bottom: 2px; }
        .suggestion-meta { font-size: .65rem; color: var(--neon-yellow); opacity: .7; }

        /* ===== HEADER ===== */
        header { text-align: center; padding: 40px 20px 20px; }
        h1 { margin-bottom: 10px; font-size: 3rem; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan), 0 0 25px var(--neon-magenta); }
        .subtitle { max-width: 600px; margin: 0 auto; opacity: .85; }

        /* ===== MINIMAP ===== */
        .minimap-nav {
            position: fixed; top: 20px; right: 20px;
            background: rgba(5,5,20,.85); border-radius: 12px; padding: 10px 14px;
            box-shadow: 0 0 15px rgba(0,246,255,.5), 0 0 30px rgba(255,0,255,.3);
            backdrop-filter: blur(10px); z-index: 10;
        }
        .minimap-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .12em; color: var(--neon-yellow); margin-bottom: 6px; }
        .minimap-dots { display: flex; gap: 6px; }
        .minimap-dot {
            width: 10px; height: 10px; border-radius: 50%;
            border: 1px solid var(--neon-cyan);
            background: radial-gradient(circle, var(--neon-magenta) 0, transparent 60%);
            cursor: pointer; box-shadow: 0 0 8px var(--neon-cyan);
            transition: transform .15s, box-shadow .15s;
        }
        .minimap-dot:hover { transform: scale(1.2); box-shadow: 0 0 14px var(--neon-yellow); }

        /* ===== SEARCH ===== */
        .search-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; }
        #search {
            width: 50%; max-width: 400px; padding: 12px; border-radius: 6px; border: none;
            font-size: 1rem; background: rgba(10,10,25,.9); color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan) inset; outline: none;
        }
        #category {
            padding: 12px; border-radius: 6px; background: rgba(10,10,25,.9);
            color: var(--neon-magenta); border: none;
            box-shadow: 0 0 10px var(--neon-magenta) inset; outline: none;
        }

        /* ===== DROP ZONE ===== */
        #dropzone {
            margin: 40px auto; width: 80%; padding: 40px;
            border: 2px dashed #0ff; border-radius: 12px;
            text-align: center; color: #0ff;
            background: rgba(0,255,255,.05); box-shadow: 0 0 20px rgba(0,255,255,.2);
        }
        #dropzone.dragover { background: rgba(0,255,255,.15); box-shadow: 0 0 30px #0ff; }
        .dropzone-container { display: flex; flex-direction: column; gap: 20px; }
        #dropzone-files {
            max-height: 200px; overflow-y: auto;
            border: 1px solid rgba(0,246,255,.3); border-radius: 8px;
            padding: 10px; background: rgba(0,246,255,.05); display: none;
        }
        #dropzone-files.active { display: block; }
        .dropzone-file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: rgba(0,246,255,.1); border-radius: 4px;
            margin-bottom: 6px; font-size: .85rem; color: var(--neon-yellow);
        }
        .dropzone-file-item .file-name { flex: 1; text-align: left; word-break: break-all; }
        .dropzone-file-item .file-remove {
            background: rgba(255,0,0,.6); color: #fff; border: none;
            padding: 3px 8px; border-radius: 3px; cursor: pointer;
            font-size: .7rem; font-weight: bold;
        }
        .dropzone-file-item .file-remove:hover { background: rgba(255,0,0,.9); }

        .dropzone-actions { display: none; gap: 10px; justify-content: center; }
        .dropzone-actions.active { display: flex; }
        .dropzone-actions button {
            padding: 10px 20px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 10px;
            transition: all .2s; font-size: .85rem;
        }
        .dropzone-actions .submit-btn { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); flex: 1; }
        .dropzone-actions .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--neon-cyan); }
        .dropzone-actions .clear-btn { background: #111; color: var(--neon-magenta); box-shadow: 0 0 10px rgba(255,0,255,.6); flex: 1; }
        .dropzone-actions .clear-btn:hover { transform: translateY(-2px); }

        /* ===== GALLERY ===== */
        .gallery-section { padding: 20px 20px 40px; }
        .gallery { display: grid; grid-template-columns: repeat(8, 1fr); gap: 15px; padding: 20px 0 40px; }
        .item {
            position: relative;
            background: radial-gradient(circle at top left, rgba(0,246,255,.25), rgba(5,5,20,.95));
            padding: 12px; border-radius: 12px; text-align: center;
            box-shadow: 0 0 15px rgba(0,246,255,.3), 0 0 30px rgba(255,0,255,.2);
            backdrop-filter: blur(12px); overflow: hidden;
            transform: translateY(0); transition: transform .2s, box-shadow .2s;
            aspect-ratio: 1; display: flex; flex-direction: column; justify-content: space-between;
        }
        .item::before {
            content: ""; position: absolute; inset: -40%;
            background: conic-gradient(from 120deg, rgba(0,246,255,.15), rgba(255,0,255,.15), rgba(255,224,102,.15), rgba(0,246,255,.15));
            mix-blend-mode: screen; opacity: .25; animation: holo-spin 18s linear infinite;
        }
        @keyframes holo-spin { to { transform: rotate(360deg); } }
        .item:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(0,246,255,.6), 0 0 50px rgba(255,0,255,.4); }
        .item-inner { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }
        .item-title { font-weight: 600; margin-bottom: 6px; color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); font-size: .85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item img { width: 100%; height: 60px; object-fit: cover; border-radius: 6px; box-shadow: 0 0 10px rgba(0,246,255,.6); margin-bottom: 6px; flex-grow: 1; }
        .item-buttons { display: flex; flex-direction: column; gap: 4px; max-height: 80px; overflow-y: auto; }
        .item a { color: #000; text-decoration: none; display: block; font-size: .7rem; padding: 3px; }
        .item-actions { margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(0,246,255,.2); display: flex; gap: 3px; }
        .item-actions button { flex: 1; padding: 2px; border: none; border-radius: 3px; font-size: .65rem; cursor: pointer; transition: all .2s; }
        .edit-btn { background: rgba(0,246,255,.6); color: #000; font-weight: bold; }
        .edit-btn:hover { background: rgba(0,246,255,.9); }
        .delete-btn { background: rgba(255,0,0,.6); color: #fff; font-weight: bold; }
        .delete-btn:hover { background: rgba(255,0,0,.9); }

        .item-glitch {
            position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0, rgba(255,255,255,.08) 1px, transparent 1px, transparent 3px);
            mix-blend-mode: soft-light; opacity: 0;
            animation: card-glitch 4s infinite; z-index: 0;
        }
        @keyframes card-glitch {
            0%,90%,100% { opacity: 0; transform: translate(0,0); }
            92% { opacity: .4; transform: translate(-2px,1px); }
            94% { opacity: .2; transform: translate(2px,-1px); }
            96% { opacity: .3; transform: translate(-1px,2px); }
        }

        /* ===== VIEWER ===== */
        .viewer-section { padding: 40px 20px 60px; }
        #viewer {
            display: none; padding: 30px;
            background: radial-gradient(circle at top, rgba(0,246,255,.15), #020208 60%);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,246,255,.6), 0 0 80px rgba(255,0,255,.4);
            position: relative; overflow: hidden;
        }
        #viewer.active { display: block; }
        #viewer::before {
            content: ""; position: absolute; inset: 0; border-radius: 20px;
            border: 2px solid transparent;
            background: linear-gradient(120deg, var(--neon-cyan), var(--neon-magenta), var(--neon-yellow)) border-box;
            -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: .9; animation: arc-flicker 2.5s infinite;
        }
        @keyframes arc-flicker {
            0%,100% { opacity: .9; filter: blur(1px); }
            40% { opacity: .5; filter: blur(2px); }
            60% { opacity: 1; filter: blur(.5px); }
        }
        .viewer-title { margin-bottom: 10px; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        model-viewer {
            width: 100%; height: 500px;
            background:
                radial-gradient(circle at center, #111 0, #000 60%),
                repeating-linear-gradient(to right, rgba(0,246,255,.15) 0, rgba(0,246,255,.15) 1px, transparent 1px, transparent 6px);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,246,255,.8), 0 0 60px rgba(255,0,255,.5);
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-block; padding: 4px 8px;
            background: var(--neon-cyan); color: #000;
            border-radius: 3px; text-decoration: none; font-weight: bold;
            box-shadow: 0 0 10px var(--neon-cyan); font-size: .7rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .btn.secondary { background: #111; color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,246,255,.6); }
        .btn:hover { transform: translateY(-1px); }

        section { scroll-margin-top: 80px; }

        @media (max-width: 1400px) { .gallery { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 1000px) { .gallery { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 700px) {
            .search-row { flex-direction: column; padding: 0 20px; }
            #search { width: 100%; }
            .gallery { grid-template-columns: repeat(2, 1fr); }
            .suggestions-floating { max-width: 200px; }
        }
    </style>
</head>

<body>

<div class="city-layer" aria-hidden="true">
    <div class="city-block" style="left:5%; bottom:0; width:40px; height:160px;"></div>
    <div class="city-block" style="left:12%; bottom:0; width:30px; height:120px; animation-delay:1s;"></div>
    <div class="city-block" style="left:22%; bottom:0; width:50px; height:200px; animation-delay:0.5s;"></div>
    <div class="city-block" style="left:35%; bottom:0; width:35px; height:140px; animation-delay:1.5s;"></div>
    <div class="city-block" style="left:50%; bottom:0; width:60px; height:220px; animation-delay:0.8s;"></div>
    <div class="city-block" style="left:65%; bottom:0; width:45px; height:180px; animation-delay:1.2s;"></div>
    <div class="city-block" style="left:78%; bottom:0; width:30px; height:130px; animation-delay:0.3s;"></div>
    <div class="city-block" style="left:88%; bottom:0; width:55px; height:210px; animation-delay:1.8s;"></div>
</div>

<div class="scanlines"></div>
<div class="glitch-noise"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 class="modal-title">Edit Item</h2>

        <div class="modal-group">
            <label class="modal-label">Item Title</label>
            <input type="text" id="editTitle" class="modal-input" placeholder="Enter title...">
        </div>

        <div class="modal-group">
            <label class="modal-label">Item Files</label>
            <div id="editFilesList" style="max-height: 200px; overflow-y: auto; border: 1px solid rgba(0, 246, 255, 0.2); border-radius: 4px; padding: 8px;">
                <!-- Files will be listed here -->
            </div>

            <div id="editAddDrop">
                + Drop files here, or click to browse
                <input type="file" id="editAddInput" multiple style="display:none;" accept=".png,.glb,.obj,.fbx,.stl">
            </div>
        </div>

        <div class="modal-buttons">
            <button class="modal-btn save" onclick="saveEditedItem()">Save</button>
            <button class="modal-btn close" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- SUGGESTIONS -->
<div class="suggestions-floating" id="suggestions-floating">
    <div class="suggestions-toggle" onclick="toggleSuggestions()">
        <div class="suggestions-label">Suggestions</div>
        <div class="suggestions-expand" id="expand-icon">▼</div>
    </div>
    <div class="suggestions-content" id="suggestions-content">
        <div class="suggestion-input-group">
            <input type="text" id="suggestion-text" placeholder="Drop a thought...">
            <button id="submit-suggestion">Send</button>
        </div>
        <div class="suggestions-archive" id="suggestions-archive">
            <p style="text-align: center; color: var(--neon-yellow); font-size: 0.7rem;">No suggestions yet.</p>
        </div>
    </div>
</div>

<!-- MINIMAP -->
<div class="minimap-nav">
    <div class="minimap-title">NAV MAP</div>
    <div class="minimap-dots">
        <div class="minimap-dot" onclick="scrollToSection('top')"></div>
        <div class="minimap-dot" onclick="scrollToSection('dropzone-section')"></div>
        <div class="minimap-dot" onclick="scrollToSection('gallery-section')"></div>
        <div class="minimap-dot" onclick="scrollToSection('viewer-section')"></div>
    </div>
</div>

<header id="top">
    <h1>LowDangles3D</h1>
    <p class="subtitle">Where models can hang out.</p>

    <div class="search-row">
        <input id="search" type="text" placeholder="Search models...">
        <select id="category">
            <option value="all">▼ All Categories</option>
            <option value="trees">Trees</option>
            <option value="ships">Ships</option>
            <option value="props">Props</option>
            <option value="creatures">Creatures</option>
        </select>
    </div>
</header>

<section id="dropzone-section">
    <div id="dropzone" class="dropzone-container">
        <p style="margin: 0; margin-bottom: 20px;">Drop any combination of PNG / GLB / OBJ / FBX / STL files here — everything you drop before hitting SUBMIT lands on one card.</p>

        <div id="dropzone-files"></div>

        <div id="dropzone-actions" class="dropzone-actions">
            <button class="submit-btn" onclick="submitDroppedFiles()">SUBMIT</button>
            <button class="clear-btn" onclick="clearDroppedFiles()">CLEAR</button>
        </div>
    </div>
</section>

<section class="gallery-section" id="gallery-section">
    <div class="gallery" id="gallery"></div>
</section>

<section class="viewer-section" id="viewer-section">
    <div id="viewer">
        <h2 class="viewer-title" id="viewer-title">3D Viewer</h2>
        <model-viewer id="mv" auto-rotate camera-controls></model-viewer>
        <br>
        <a class="btn secondary" href="#" onclick="closeViewer()">Close</a>
    </div>
</section>

<script>
const VALID_EXTS = ['png', 'glb', 'obj', 'fbx', 'stl'];
const MODEL_EXTS = ['glb', 'obj', 'fbx', 'stl'];

let droppedFiles = [];          // files staged: [{name, ext, blob}]
let editingItem = null;         // the .item DOM node currently open in the edit modal
let editingFiles = [];          // working copy of files while modal is open
const itemsById = new Map();    // id -> {id, title, category, files:[{name,ext,blob}], createdAt}
const thumbUrls = new Map();    // id -> object URL currently used for that card's thumbnail
let currentViewerUrl = null;    // object URL currently shown in 3D viewer (revoked on close/swap)

/* ===== IndexedDB persistence =====
   Files can easily exceed localStorage's ~5 MB cap, so we use IndexedDB.
   One object store "items" keyed by id. Value: {id, title, category, files, createdAt}.
*/
const DB_NAME = 'lowdangles3d';
const DB_VERSION = 1;
const STORE = 'items';
let _dbPromise = null;

function openDB() {
    if (_dbPromise) return _dbPromise;
    _dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE)) {
                db.createObjectStore(STORE, { keyPath: 'id' });
            }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => { _dbPromise = null; reject(e.target.error); };
    });
    return _dbPromise;
}

async function idbPut(item) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function idbDelete(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

async function idbGetAll() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readonly');
        const req = tx.objectStore(STORE).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
    });
}

function newItemId() {
    return 'it_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function scrollToSection(id) {
    const el = document.getElementById(id);
    if (!el) return;
    window.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
}

function toggleSuggestions() {
    const content = document.getElementById('suggestions-content');
    const floating = document.getElementById('suggestions-floating');
    const icon = document.getElementById('expand-icon');
    content.classList.toggle('hidden');
    floating.classList.toggle('collapsed');
    icon.textContent = content.classList.contains('hidden') ? '▶' : '▼';
}

/* ===== 3D Viewer ===== */
function openViewer(modelDataUrl, title) {
    const mv = document.getElementById('mv');
    mv.setAttribute('src', modelDataUrl);
    document.getElementById('viewer-title').textContent = title ? title + " – 3D View" : "3D Viewer";
    document.getElementById('viewer').classList.add('active');
    scrollToSection('viewer-section');
}
function closeViewer() {
    document.getElementById('viewer').classList.remove('active');
    const mv = document.getElementById('mv');
    mv.removeAttribute('src');
    if (currentViewerUrl) {
        URL.revokeObjectURL(currentViewerUrl);
        currentViewerUrl = null;
    }
}

/* ===== Search / category ===== */
document.getElementById('search').addEventListener('input', filterItems);
document.getElementById('category').addEventListener('change', filterItems);
function filterItems() {
    const search = document.getElementById('search').value.toLowerCase();
    const category = document.getElementById('category').value;
    document.querySelectorAll('.item').forEach(item => {
        const name = (item.getAttribute('data-name') || '').toLowerCase();
        const cat = item.getAttribute('data-category') || 'all';
        const matchesSearch = name.includes(search);
        const matchesCategory = (category === 'all' || category === cat);
        item.style.display = (matchesSearch && matchesCategory) ? '' : 'none';
    });
}

/* ===== Helpers ===== */
function filesToRecords(fileList) {
    const all = Array.from(fileList);
    const accepted = [];
    const rejected = [];
    for (const f of all) {
        const ext = f.name.split('.').pop().toLowerCase();
        if (VALID_EXTS.includes(ext)) {
            accepted.push({ name: f.name, ext, blob: f });
        } else {
            rejected.push(f);
        }
    }
    if (rejected.length > 0) {
        const names = rejected.map(f => f.name).join(', ');
        alert(`Skipped ${rejected.length} unsupported file(s): ${names}\n\nAllowed: ${VALID_EXTS.join(', ')}`);
    }
    return accepted;
}

/* ===== Main drop zone ===== */
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    droppedFiles.push(...filesToRecords(e.dataTransfer.files));
    updateDropzoneDisplay();
});

function updateDropzoneDisplay() {
    const filesList = document.getElementById('dropzone-files');
    const actions = document.getElementById('dropzone-actions');
    filesList.innerHTML = '';

    if (droppedFiles.length === 0) {
        filesList.classList.remove('active');
        actions.classList.remove('active');
        return;
    }
    filesList.classList.add('active');
    actions.classList.add('active');

    droppedFiles.forEach((file, index) => {
        const row = document.createElement('div');
        row.className = 'dropzone-file-item';
        row.innerHTML = `
            <span class="file-name">${file.name}</span>
            <button class="file-remove" data-idx="${index}">✕</button>
        `;
        row.querySelector('.file-remove').addEventListener('click', () => {
            droppedFiles.splice(index, 1);
            updateDropzoneDisplay();
        });
        filesList.appendChild(row);
    });
}

function clearDroppedFiles() {
    droppedFiles = [];
    updateDropzoneDisplay();
}

/* ===== SUBMIT: everything in the drop zone becomes ONE card ===== */
async function submitDroppedFiles() {
    if (droppedFiles.length === 0) return;

    const firstModel = droppedFiles.find(f => MODEL_EXTS.includes(f.ext));
    const titleSource = (firstModel || droppedFiles[0]).name;
    const title = titleSource.replace(/\.[^.]+$/, '') || 'New Item';

    const itemData = {
        id: newItemId(),
        title,
        category: 'all',
        files: droppedFiles.slice(),
        createdAt: Date.now()
    };

    try {
        await idbPut(itemData);
    } catch (err) {
        alert('Could not save to your browser storage:\n' + (err && err.message ? err.message : err) + '\n\nYour browser may be out of space or in private mode.');
        return;
    }

    itemsById.set(itemData.id, itemData);
    const card = createItemCard(itemData);
    document.getElementById('gallery').appendChild(card);

    clearDroppedFiles();
    filterItems();
}

/* ===== Card rendering ===== */
function createItemCard(data) {
    const itemDiv = document.createElement('div');
    itemDiv.className = 'item';
    renderCardContent(itemDiv, data);
    return itemDiv;
}

function renderCardContent(itemDiv, data) {
    const id = data.id;
    if (id) itemDiv.setAttribute('data-id', id);
    itemDiv.setAttribute('data-name', data.title);
    itemDiv.setAttribute('data-category', data.category || 'all');

    // Revoke any prior thumbnail URL for this card before re-rendering
    if (id && thumbUrls.has(id)) {
        URL.revokeObjectURL(thumbUrls.get(id));
        thumbUrls.delete(id);
    }

    itemDiv.innerHTML = '';

    const glitchDiv = document.createElement('div');
    glitchDiv.className = 'item-glitch';
    itemDiv.appendChild(glitchDiv);

    const innerDiv = document.createElement('div');
    innerDiv.className = 'item-inner';

    const titleDiv = document.createElement('div');
    titleDiv.className = 'item-title';
    titleDiv.textContent = data.title;
    innerDiv.appendChild(titleDiv);

    const firstPng = data.files.find(f => f.ext === 'png');
    if (firstPng) {
        const url = URL.createObjectURL(firstPng.blob);
        if (id) thumbUrls.set(id, url);
        const img = document.createElement('img');
        img.src = url;
        img.alt = data.title;
        innerDiv.appendChild(img);
    }

    const buttonsDiv = document.createElement('div');
    buttonsDiv.className = 'item-buttons';
    data.files.forEach((file, idx) => {
        if (!MODEL_EXTS.includes(file.ext)) return;
        const link = document.createElement('a');
        link.href = '#';
        link.className = 'btn';
        link.title = file.name;
        link.textContent = file.ext.toUpperCase() + ' · ' + file.name;
        link.onclick = e => {
            e.preventDefault();
            openViewerForFile(id, idx);
        };
        buttonsDiv.appendChild(link);
    });
    innerDiv.appendChild(buttonsDiv);

    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'item-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => openEditModal(itemDiv);
    actionsDiv.appendChild(editBtn);

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = 'Delete';
    deleteBtn.onclick = async () => {
        const cardId = itemDiv.getAttribute('data-id');
        if (cardId) {
            try { await idbDelete(cardId); }
            catch (err) { alert('Could not delete from storage: ' + (err && err.message ? err.message : err)); return; }
            if (thumbUrls.has(cardId)) {
                URL.revokeObjectURL(thumbUrls.get(cardId));
                thumbUrls.delete(cardId);
            }
            itemsById.delete(cardId);
        }
        itemDiv.remove();
    };
    actionsDiv.appendChild(deleteBtn);

    innerDiv.appendChild(actionsDiv);
    itemDiv.appendChild(innerDiv);
}

function openViewerForFile(itemId, fileIndex) {
    const item = itemsById.get(itemId);
    if (!item) return;
    const file = item.files[fileIndex];
    if (!file) return;
    if (currentViewerUrl) {
        URL.revokeObjectURL(currentViewerUrl);
        currentViewerUrl = null;
    }
    currentViewerUrl = URL.createObjectURL(file.blob);
    openViewer(currentViewerUrl, file.name);
}

/* ===== Edit modal: add + delete files ===== */
function openEditModal(itemElement) {
    editingItem = itemElement;
    const id = itemElement.getAttribute('data-id');
    const item = id ? itemsById.get(id) : null;
    editingFiles = item ? item.files.slice() : [];
    document.getElementById('editTitle').value = itemElement.getAttribute('data-name') || '';
    renderEditFilesList();
    document.getElementById('editModal').classList.add('active');
}

function renderEditFilesList() {
    const list = document.getElementById('editFilesList');
    list.innerHTML = '';

    if (editingFiles.length === 0) {
        list.innerHTML = '<p style="color: var(--neon-yellow); font-size: .8rem; text-align: center; margin: 6px 0;">No files yet — add some below.</p>';
        return;
    }

    editingFiles.forEach((file, index) => {
        const row = document.createElement('div');
        row.className = 'dropzone-file-item';
        row.innerHTML = `
            <span class="file-name">${file.name}</span>
            <button class="file-remove">✕</button>
        `;
        row.querySelector('.file-remove').addEventListener('click', () => {
            editingFiles.splice(index, 1);
            renderEditFilesList();
        });
        list.appendChild(row);
    });
}

/* Add-files: drag/drop AND click-to-browse */
const editAddDrop = document.getElementById('editAddDrop');
const editAddInput = document.getElementById('editAddInput');

editAddDrop.addEventListener('click', () => editAddInput.click());
editAddInput.addEventListener('change', e => {
    editingFiles.push(...filesToRecords(e.target.files));
    renderEditFilesList();
    editAddInput.value = '';
});
editAddDrop.addEventListener('dragover', e => { e.preventDefault(); editAddDrop.classList.add('dragover'); });
editAddDrop.addEventListener('dragleave', () => editAddDrop.classList.remove('dragover'));
editAddDrop.addEventListener('drop', e => {
    e.preventDefault();
    editAddDrop.classList.remove('dragover');
    editingFiles.push(...filesToRecords(e.dataTransfer.files));
    renderEditFilesList();
});

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    editingItem = null;
    editingFiles = [];
}

async function saveEditedItem() {
    if (!editingItem) { closeEditModal(); return; }
    const title = document.getElementById('editTitle').value.trim() || 'Untitled';
    const category = editingItem.getAttribute('data-category') || 'all';
    let id = editingItem.getAttribute('data-id');
    if (!id) { id = newItemId(); editingItem.setAttribute('data-id', id); }
    const prev = itemsById.get(id);
    const createdAt = (prev && prev.createdAt) ? prev.createdAt : Date.now();

    const data = { id, title, category, files: editingFiles, createdAt, updatedAt: Date.now() };
    try {
        await idbPut(data);
    } catch (err) {
        alert('Could not save changes: ' + (err && err.message ? err.message : err));
        return;
    }
    itemsById.set(id, data);
    renderCardContent(editingItem, data);
    closeEditModal();
    filterItems();
}

/* ===== Suggestions ===== */
document.getElementById('submit-suggestion').addEventListener('click', submitSuggestion);
document.getElementById('suggestion-text').addEventListener('keypress', e => {
    if (e.key === 'Enter') submitSuggestion();
});

function submitSuggestion() {
    const input = document.getElementById('suggestion-text');
    const text = input.value.trim();
    if (!text) return;
    const suggestions = JSON.parse(localStorage.getItem('suggestions') || '[]');
    suggestions.push({ text, timestamp: new Date().toLocaleString() });
    localStorage.setItem('suggestions', JSON.stringify(suggestions));
    updateSuggestionsArchive();
    input.value = '';
}

function updateSuggestionsArchive() {
    const archive = document.getElementById('suggestions-archive');
    const suggestions = JSON.parse(localStorage.getItem('suggestions') || '[]');
    archive.innerHTML = '';
    if (suggestions.length === 0) {
        archive.innerHTML = '<p style="text-align: center; color: var(--neon-yellow); font-size: 0.7rem;">No suggestions yet.</p>';
        return;
    }
    suggestions.slice().reverse().forEach(suggestion => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        const text = document.createElement('div');
        text.className = 'suggestion-text';
        text.textContent = suggestion.text;
        const meta = document.createElement('div');
        meta.className = 'suggestion-meta';
        meta.textContent = suggestion.timestamp;
        item.appendChild(text);
        item.appendChild(meta);
        archive.appendChild(item);
    });
}

window.addEventListener('load', updateSuggestionsArchive);

/* ===== Rehydrate gallery from IndexedDB on page load ===== */
async function loadGalleryFromStorage() {
    try {
        const items = await idbGetAll();
        items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        const gallery = document.getElementById('gallery');
        items.forEach(data => {
            itemsById.set(data.id, data);
            gallery.appendChild(createItemCard(data));
        });
        filterItems();
    } catch (err) {
        console.error('Failed to load saved items:', err);
    }
}
window.addEventListener('load', loadGalleryFromStorage);
</script>
