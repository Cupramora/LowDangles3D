<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dane’s 3D Object Library</title>

    <!-- 3D Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
        }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        h1 { margin-bottom: 10px; }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px;
        }
        .item {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .item img {
            width: 100%;
            border-radius: 6px;
        }
        .item a {
            color: #6cf;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }

        /* Pocket Dimension Viewer */
        #viewer {
            display: none;
            padding: 40px;
            background: #000;
        }
        #viewer.active {
            display: block;
        }
        model-viewer {
            width: 100%;
            height: 500px;
            background: #111;
            border-radius: 10px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 18px;
            margin: 10px 5px;
            background: #6cf;
            color: #000;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn.discount {
            background: #4f9;
        }
    </style>
</head>

<body>

<header>
    <h1>Dane’s 3D Object Library</h1>
    <p>Click any item to view it in 3D or download it.</p>
</header>

<!-- GALLERY -->
<div class="gallery">

    <!-- TEMPLATE ITEM (duplicate this block for each model) -->
    <div class="item">
        <img src="assets/palm_clip.png" alt="Palm Clip Art">

        <!-- Open Viewer -->
        <a href="#" onclick="openViewer('assets/palm_tree.glb')">View in 3D</a>

        <!-- PayPal/Gumroad Download -->
        <a class="btn" href="https://your-payment-link-here" target="_blank">Download</a>

        <!-- Discount Button -->
        <a class="btn discount" href="https://your-discount-link-here" target="_blank">Discount</a>
    </div>

</div>

<!-- POCKET DIMENSION VIEWER -->
<div id="viewer">
    <h2>3D Viewer</h2>
    <model-viewer id="mv" auto-rotate camera-controls></model-viewer>

    <br>

    <!-- Close Viewer -->
    <a class="btn" href="#" onclick="closeViewer()">Close Viewer</a>
</div>

<script>
function openViewer(modelPath) {
    document.getElementById('mv').setAttribute('src', modelPath);
    document.getElementById('viewer').classList.add('active');
    window.scrollTo(0, document.body.scrollHeight);
}

function closeViewer() {
    document.getElementById('viewer').classList.remove('active');
}
</script>

</body>
</html>
