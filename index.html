<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LowDangles3D</title>

    <!-- 3D Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --neon-cyan: #00f6ff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffe066;
            --bg-deep: #050308;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: #e6e6e6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND: PICASSO CYBER CITY + VOID DISTORTIONS ===== */

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, #2b0b45 0, transparent 40%),
                radial-gradient(circle at 80% 10%, #0b3b5f 0, transparent 45%),
                radial-gradient(circle at 20% 80%, #5f0b3b 0, transparent 45%),
                linear-gradient(135deg, #050308 0, #050308 40%, #0a0b1a 100%);
            mix-blend-mode: screen;
            opacity: 0.8;
            z-index: -3;
        }

        /* Abstract city blocks */
        .city-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            opacity: 0.35;
        }

        .city-block {
            position: absolute;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.9),
                rgba(0, 246, 255, 0.2)
            );
            border-radius: 4px;
            box-shadow:
                0 0 10px rgba(0, 246, 255, 0.4),
                0 0 25px rgba(255, 0, 255, 0.3);
            transform-origin: bottom;
            animation: city-float 12s ease-in-out infinite alternate;
        }

        @keyframes city-float {
            0% { transform: translateY(0) skewX(-6deg); }
            100% { transform: translateY(-10px) skewX(-3deg); }
        }

        /* Scanline + glitch overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.04) 1px,
                transparent 1px
            );
            background-size: 100% 2px;
            mix-blend-mode: soft-light;
            opacity: 0.25;
            z-index: -1;
            animation: scan-flicker 3s linear infinite;
        }

        @keyframes scan-flicker {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.35; }
        }

        .glitch-noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.03) 0,
                rgba(255, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            mix-blend-mode: overlay;
            opacity: 0.18;
            z-index: -1;
        }

        /* ===== MODAL STYLES ===== */

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: radial-gradient(circle at top,
                rgba(0, 246, 255, 0.15),
                #020208 60%
            );
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 246, 255, 0.6);
        }

        .modal-title {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 20px;
        }

        .modal-group {
            margin-bottom: 15px;
        }

        .modal-label {
            color: var(--neon-yellow);
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 20, 30, 0.9);
            color: var(--neon-cyan);
            box-sizing: border-box;
            outline: none;
        }

        .modal-input:focus {
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.4) inset;
        }

        .file-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .file-selector select {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 20, 30, 0.9);
            color: var(--neon-cyan);
            outline: none;
        }

        .file-selector button {
            padding: 8px 12px;
            background: var(--neon-magenta);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .file-selector button:hover {
            transform: translateY(-1px);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px;
            transition: all 0.2s;
        }

        .modal-btn.save {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .modal-btn.save:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        .modal-btn.close {
            background: #111;
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 246, 255, 0.6);
        }

        .modal-btn.close:hover {
            transform: translateY(-2px);
        }

        /* ===== SUBTLE SUGGESTIONS BOX (TOP LEFT) ===== */

        .suggestions-floating {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(5, 5, 20, 0.7);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 0 10px rgba(0, 246, 255, 0.2);
            backdrop-filter: blur(8px);
            z-index: 9;
            max-width: 280px;
            border: 1px solid rgba(0, 246, 255, 0.15);
        }

        .suggestions-floating.collapsed {
            padding: 8px 12px;
        }

        .suggestions-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .suggestions-toggle.collapsed {
            margin-bottom: 0;
        }

        .suggestions-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--neon-yellow);
        }

        .suggestions-expand {
            font-size: 0.8rem;
            color: var(--neon-cyan);
        }

        .suggestions-content {
            display: block;
        }

        .suggestions-content.hidden {
            display: none;
        }

        .suggestion-input-group {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        #suggestion-text {
            flex: 1;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 20, 30, 0.8);
            color: var(--neon-cyan);
            font-size: 0.8rem;
            box-shadow: 0 0 8px rgba(0, 246, 255, 0.15) inset;
            outline: none;
        }

        #suggestion-text:focus {
            box-shadow: 0 0 12px rgba(0, 246, 255, 0.3) inset;
        }

        #submit-suggestion {
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
            background: var(--neon-magenta);
            color: #000;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-magenta);
            transition: all 0.2s;
        }

        #submit-suggestion:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px var(--neon-magenta);
        }

        .suggestions-archive {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(0, 246, 255, 0.15);
            border-radius: 4px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.75rem;
        }

        .suggestion-item {
            padding: 4px;
            margin-bottom: 4px;
            border-left: 1px solid var(--neon-cyan);
            background: rgba(0, 246, 255, 0.03);
            border-radius: 2px;
            line-height: 1.3;
        }

        .suggestion-text {
            color: var(--neon-cyan);
            margin-bottom: 2px;
        }

        .suggestion-meta {
            font-size: 0.65rem;
            color: var(--neon-yellow);
            opacity: 0.7;
        }

        /* ===== HEADER / TITLE ===== */

        header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 3rem;
            color: var(--neon-cyan);
            text-shadow:
                0 0 10px var(--neon-cyan),
                0 0 25px var(--neon-magenta);
        }

        .subtitle {
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.85;
        }

        /* ===== NEON MINIMAP NAV BAR ===== */

        .minimap-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(5, 5, 20, 0.85);
            border-radius: 12px;
            padding: 10px 14px;
            box-shadow:
                0 0 15px rgba(0, 246, 255, 0.5),
                0 0 30px rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .minimap-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--neon-yellow);
            margin-bottom: 6px;
        }

        .minimap-dots {
            display: flex;
            gap: 6px;
        }

        .minimap-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid var(--neon-cyan);
            background: radial-gradient(circle, var(--neon-magenta) 0, transparent 60%);
            cursor: pointer;
            box-shadow: 0 0 8px var(--neon-cyan);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .minimap-dot:hover {
            transform: scale(1.2);
            box-shadow: 0 0 14px var(--neon-yellow);
        }

        /* ===== SEARCH + CATEGORY ===== */

        .search-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        #search {
            width: 50%;
            max-width: 400px;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
            background: rgba(10, 10, 25, 0.9);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan) inset;
            outline: none;
        }

        #category {
            padding: 12px;
            border-radius: 6px;
            background: rgba(10, 10, 25, 0.9);
            color: var(--neon-magenta);
            border: none;
            box-shadow: 0 0 10px var(--neon-magenta) inset;
            outline: none;
        }

        /* ===== DROP ZONE ===== */

        #dropzone {
            margin: 40px auto;
            width: 80%;
            padding: 40px;
            border: 2px dashed #0ff;
            border-radius: 12px;
            text-align: center;
            color: #0ff;
            background: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        #dropzone.dragover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 30px #0ff;
        }

        /* ===== GALLERY / MATRIX GRID (8 COLUMNS) ===== */

        .gallery-section {
            padding: 20px 20px 40px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 15px;
            padding: 20px 0 40px;
        }

        .item {
            position: relative;
            background: radial-gradient(circle at top left,
                rgba(0, 246, 255, 0.25),
                rgba(5, 5, 20, 0.95)
            );
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            box-shadow:
                0 0 15px rgba(0, 246, 255, 0.3),
                0 0 30px rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(12px);
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.2s, box-shadow 0.2s;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item::before {
            content: "";
            position: absolute;
            inset: -40%;
            background: conic-gradient(
                from 120deg,
                rgba(0, 246, 255, 0.15),
                rgba(255, 0, 255, 0.15),
                rgba(255, 224, 102, 0.15),
                rgba(0, 246, 255, 0.15)
            );
            mix-blend-mode: screen;
            opacity: 0.25;
            animation: holo-spin 18s linear infinite;
        }

        @keyframes holo-spin {
            to { transform: rotate(360deg); }
        }

        .item:hover {
            transform: translateY(-3px);
            box-shadow:
                0 0 25px rgba(0, 246, 255, 0.6),
                0 0 50px rgba(255, 0, 255, 0.4);
        }

        .item-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--neon-yellow);
            text-shadow: 0 0 8px var(--neon-yellow);
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item img {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 246, 255, 0.6);
            margin-bottom: 6px;
            flex-grow: 1;
        }

        .item-buttons {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item a {
            color: #000;
            text-decoration: none;
            display: block;
            font-size: 0.7rem;
            padding: 3px;
        }

        .item-actions {
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(0, 246, 255, 0.2);
            display: flex;
            gap: 3px;
        }

        .item-actions button {
            flex: 1;
            padding: 2px;
            border: none;
            border-radius: 3px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn {
            background: rgba(0, 246, 255, 0.6);
            color: #000;
            font-weight: bold;
        }

        .edit-btn:hover {
            background: rgba(0, 246, 255, 0.9);
        }

        .delete-btn {
            background: rgba(255, 0, 0, 0.6);
            color: #fff;
            font-weight: bold;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 0.9);
        }

        /* Glitch flicker on cards */
        .item-glitch {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.08) 0,
                rgba(255, 255, 255, 0.08) 1px,
                transparent 1px,
                transparent 3px
            );
            mix-blend-mode: soft-light;
            opacity: 0;
            animation: card-glitch 4s infinite;
            z-index: 0;
        }

        @keyframes card-glitch {
            0%, 90%, 100% { opacity: 0; transform: translate(0, 0); }
            92% { opacity: 0.4; transform: translate(-2px, 1px); }
            94% { opacity: 0.2; transform: translate(2px, -1px); }
            96% { opacity: 0.3; transform: translate(-1px, 2px); }
        }

        /* ===== POCKET DIMENSION VIEWER ===== */

        .viewer-section {
            padding: 40px 20px 60px;
        }

        #viewer {
            display: none;
            padding: 30px;
            background: radial-gradient(circle at top,
                rgba(0, 246, 255, 0.15),
                #020208 60%
            );
            border-radius: 20px;
            box-shadow:
                0 0 40px rgba(0, 246, 255, 0.6),
                0 0 80px rgba(255, 0, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        #viewer.active {
            display: block;
        }

        /* Electric arc border */
        #viewer::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            border: 2px solid transparent;
            background:
                linear-gradient(120deg, var(--neon-cyan), var(--neon-magenta), var(--neon-yellow))
                border-box;
            -webkit-mask:
                linear-gradient(#000 0 0) padding-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.9;
            animation: arc-flicker 2.5s infinite;
        }

        @keyframes arc-flicker {
            0%, 100% { opacity: 0.9; filter: blur(1px); }
            40% { opacity: 0.5; filter: blur(2px); }
            60% { opacity: 1; filter: blur(0.5px); }
        }

        .viewer-title {
            margin-bottom: 10px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        model-viewer {
            width: 100%;
            height: 500px;
            background:
                radial-gradient(circle at center, #111 0, #000 60%),
                repeating-linear-gradient(
                    to right,
                    rgba(0, 246, 255, 0.15) 0,
                    rgba(0, 246, 255, 0.15) 1px,
                    transparent 1px,
                    transparent 6px
                );
            border-radius: 12px;
            box-shadow:
                0 0 30px rgba(0, 246, 255, 0.8),
                0 0 60px rgba(255, 0, 255, 0.5);
        }

        /* ===== BUTTONS ===== */

        .btn {
            display: inline-block;
            padding: 4px 8px;
            background: var(--neon-cyan);
            color: #000;
            border-radius: 3px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-cyan);
            font-size: 0.7rem;
        }

        .btn.discount {
            background: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .btn.secondary {
            background: #111;
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 246, 255, 0.6);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        /* ===== SECTIONS FOR MINIMAP ===== */

        section {
            scroll-margin-top: 80px;
        }

        /* ===== RESPONSIVE ===== */

        @media (max-width: 1400px) {
            .gallery {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @media (max-width: 1000px) {
            .gallery {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 700px) {
            .search-row {
                flex-direction: column;
                padding: 0 20px;
            }
            #search {
                width: 100%;
            }
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            .suggestions-floating {
                max-width: 200px;
            }
        }
    </style>
</head>

<body>

<!-- ABSTRACT CITY LAYER -->
<div class="city-layer" aria-hidden="true">
    <div class="city-block" style="left:5%; bottom:0; width:40px; height:160px;"></div>
    <div class="city-block" style="left:12%; bottom:0; width:30px; height:120px; animation-delay:1s;"></div>
    <div class="city-block" style="left:22%; bottom:0; width:50px; height:200px; animation-delay:0.5s;"></div>
    <div class="city-block" style="left:35%; bottom:0; width:35px; height:140px; animation-delay:1.5s;"></div>
    <div class="city-block" style="left:50%; bottom:0; width:60px; height:220px; animation-delay:0.8s;"></div>
    <div class="city-block" style="left:65%; bottom:0; width:45px; height:180px; animation-delay:1.2s;"></div>
    <div class="city-block" style="left:78%; bottom:0; width:30px; height:130px; animation-delay:0.3s;"></div>
    <div class="city-block" style="left:88%; bottom:0; width:55px; height:210px; animation-delay:1.8s;"></div>
</div>

<div class="scanlines"></div>
<div class="glitch-noise"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 class="modal-title">Edit Item</h2>
        
        <div class="modal-group">
            <label class="modal-label">Item Title</label>
            <input type="text" id="editTitle" class="modal-input" placeholder="Enter title...">
        </div>

        <div class="modal-group">
            <label class="modal-label">PNG Thumbnail</label>
            <div class="file-selector">
                <select id="pngSelector">
                    <option value="">-- Select PNG --</option>
                </select>
                <button onclick="addFileToItem('png')">Add</button>
            </div>
        </div>

        <div class="modal-group">
            <label class="modal-label">GLB File</label>
            <div class="file-selector">
                <select id="glbSelector">
                    <option value="">-- Select GLB --</option>
                </select>
                <button onclick="addFileToItem('glb')">Add</button>
            </div>
        </div>

        <div class="modal-group">
            <label class="modal-label">OBJ File</label>
            <div class="file-selector">
                <select id="objSelector">
                    <option value="">-- Select OBJ --</option>
                </select>
                <button onclick="addFileToItem('obj')">Add</button>
            </div>
        </div>

        <div class="modal-group">
            <label class="modal-label">FBX File</label>
            <div class="file-selector">
                <select id="fbxSelector">
                    <option value="">-- Select FBX --</option>
                </select>
                <button onclick="addFileToItem('fbx')">Add</button>
            </div>
        </div>

        <div class="modal-group">
            <label class="modal-label">STL File</label>
            <div class="file-selector">
                <select id="stlSelector">
                    <option value="">-- Select STL --</option>
                </select>
                <button onclick="addFileToItem('stl')">Add</button>
            </div>
        </div>

        <div class="modal-buttons">
            <button class="modal-btn save" onclick="saveEditedItem()">Save</button>
            <button class="modal-btn close" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- SUBTLE SUGGESTIONS BOX (TOP LEFT) -->
<div class="suggestions-floating" id="suggestions-floating">
    <div class="suggestions-toggle" onclick="toggleSuggestions()">
        <div class="suggestions-label">💬 Suggestions</div>
        <div class="suggestions-expand" id="expand-icon">▼</div>
    </div>
    <div class="suggestions-content" id="suggestions-content">
        <div class="suggestion-input-group">
            <input type="text" id="suggestion-text" placeholder="Drop a thought...">
            <button id="submit-suggestion">Send</button>
        </div>
        <div class="suggestions-archive" id="suggestions-archive">
            <p style="text-align: center; color: var(--neon-yellow); font-size: 0.7rem;">No suggestions yet.</p>
        </div>
    </div>
</div>

<!-- NEON MINIMAP NAV -->
<div class="minimap-nav">
    <div class="minimap-title">NAV MAP</div>
    <div class="minimap-dots">
        <div class="minimap-dot" onclick="scrollToSection('top')"></div>
        <div class="minimap-dot" onclick="scrollToSection('dropzone-section')"></div>
        <div class="minimap-dot" onclick="scrollToSection('gallery-section')"></div>
        <div class="minimap-dot" onclick="scrollToSection('viewer-section')"></div>
    </div>
</div>

<header id="top">
    <h1>LowDangles3D</h1>
    <p class="subtitle">Where models can hang out.</p>

    <div class="search-row">
        <input id="search" type="text" placeholder="Search models...">

        <select id="category">
            <option value="all">▼ All Categories</option>
            <option value="trees">Trees</option>
            <option value="ships">Ships</option>
            <option value="props">Props</option>
            <option value="creatures">Creatures</option>
        </select>
    </div>
</header>

<section id="dropzone-section">
    <div id="dropzone">
        <p>Drop PNG + GLB + OBJ + FBX + STL files here</p>
    </div>
</section>

<section class="gallery-section" id="gallery-section">
    <div class="gallery" id="gallery">

    </div>
</section>

<section class="viewer-section" id="viewer-section">
    <div id="viewer">
        <h2 class="viewer-title" id="viewer-title">3D Viewer</h2>
        <model-viewer id="mv" auto-rotate camera-controls></model-viewer>

        <br>

        <a class="btn secondary" href="#" onclick="closeViewer()">Close</a>
    </div>
</section>

<script>
let currentEditingIndex = -1;
let allUploadedFiles = [];

function scrollToSection(id) {
    const el = document.getElementById(id);
    if (!el) return;
    window.scrollTo({
        top: el.offsetTop - 20,
        behavior: 'smooth'
    });
}

    /* Toggle suggestions box */
function toggleSuggestions() {
    const content = document.getElementById('suggestions-content');
    const floating = document.getElementById('suggestions-floating');
    const icon = document.getElementById('expand-icon');
    
    content.classList.toggle('hidden');
    floating.classList.toggle('collapsed');
    icon.textContent = content.classList.contains('hidden') ? '▶' : '▼';
}
/* Open 3D Viewer */
function openViewer(modelPath, title) {
    const mv = document.getElementById('mv');
    mv.setAttribute('src', modelPath);

    const vt = document.getElementById('viewer-title');
    vt.textContent = title ? title + " – 3D View" : "3D Viewer";

    const viewer = document.getElementById('viewer');
    viewer.classList.add('active');

    scrollToSection('viewer-section');
}
/* Close 3D Viewer */
function closeViewer() {
    document.getElementById('viewer').classList.remove('active');
}
/* SEARCH + CATEGORY FILTER */
document.getElementById('search').addEventListener('input', filterItems);
document.getElementById('category').addEventListener('change', filterItems);

function filterItems() {
    let search = document.getElementById('search').value.toLowerCase();
    let category = document.getElementById('category').value;
    let items = document.querySelectorAll('.item');

    items.forEach(item => {
        let name = item.getAttribute('data-name').toLowerCase();
        let cat = item.getAttribute('data-category');

        let matchesSearch = name.includes(search);
        let matchesCategory = (category === 'all' || category === cat);

        if (matchesSearch && matchesCategory) {
            item.style.display = '';
        } else {
            item.style.display = 'none';
        }
    });
}

/* Drop Zone Handler */
const dropzone = document.getElementById('dropzone');

dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    
    const files = e.dataTransfer.files;
    processDroppedFiles(files);
});

function processDroppedFiles(files) {
    let itemData = {
        title: 'New Item',
        thumbnail: null,
        models: {
            glb: null,
            obj: null,
            fbx: null,
            stl: null
        }
    };

    for (let file of files) {
        const ext = file.name.split('.').pop().toLowerCase();
        const reader = new FileReader();

        reader.onload = (e) => {
            const dataUrl = e.target.result;

            if (ext === 'png') {
                itemData.thumbnail = dataUrl;
            } else if (['glb', 'obj', 'fbx', 'stl'].includes(ext)) {
                itemData.models[ext] = {
                    name: file.name,
                    data: dataUrl
                };
            }

            // Check if all files for this item have been processed
            const allFilesProcessed = files.length === Object.keys(itemData.models).filter(k => itemData.models[k] !== null).length + (itemData.thumbnail ? 1 : 0);
            if (allFilesProcessed) {
                addItem(itemData);
            }
        };

        reader.readAsDataURL(file);
    }
}

function addItem(itemData) {
    const gallery = document.getElementById('gallery');
    const item = createItemCard(itemData);
    gallery.appendChild(item);
}

function createItemCard(data) {
    const itemDiv = document.createElement('div');
    itemDiv.className = 'item';
    itemDiv.setAttribute('data-name', data.title);
    itemDiv.setAttribute('data-category', 'all');

    // Add glitch overlay
    const glitchDiv = document.createElement('div');
    glitchDiv.className = 'item-glitch';
    itemDiv.appendChild(glitchDiv);

    // Create inner container
    const innerDiv = document.createElement('div');
    innerDiv.className = 'item-inner';

    // Title
    const titleDiv = document.createElement('div');
    titleDiv.className = 'item-title';
    titleDiv.textContent = data.title;
    innerDiv.appendChild(titleDiv);

    // Thumbnail
    if (data.thumbnail) {
        const img = document.createElement('img');
        img.src = data.thumbnail;
        img.alt = data.title;
        innerDiv.appendChild(img);
    }

    // Model buttons
    const buttonsDiv = document.createElement('div');
    buttonsDiv.className = 'item-buttons';

    for (const [format, modelData] of Object.entries(data.models)) {
        if (modelData) {
            const link = document.createElement('a');
            link.href = '#';
            link.className = 'btn';
            link.textContent = format.toUpperCase();
            link.onclick = (e) => {
                e.preventDefault();
                openViewer(modelData.data, data.title);
            };
            buttonsDiv.appendChild(link);
        }
    }

    innerDiv.appendChild(buttonsDiv);

    // Actions
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'item-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => openEditModal(itemDiv);
    actionsDiv.appendChild(editBtn);

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = 'Delete';
    deleteBtn.onclick = () => itemDiv.remove();
    actionsDiv.appendChild(deleteBtn);

    innerDiv.appendChild(actionsDiv);
    itemDiv.appendChild(innerDiv);

    return itemDiv;
}

function openEditModal(itemElement) {
    currentEditingIndex = Array.from(document.getElementById('gallery').children).indexOf(itemElement);
    const title = itemElement.getAttribute('data-name');
    document.getElementById('editTitle').value = title;

    // Update file selectors with available files
    const pngSelector = document.getElementById('pngSelector');
    const glbSelector = document.getElementById('glbSelector');
    const objSelector = document.getElementById('objSelector');
    const fbxSelector = document.getElementById('fbxSelector');
    const stlSelector = document.getElementById('stlSelector');

    // Clear previous options
    [pngSelector, glbSelector, objSelector, fbxSelector, stlSelector].forEach(sel => {
        while (sel.children.length > 1) sel.removeChild(sel.lastChild);
    });

    // Add uploaded files to selectors
    allUploadedFiles.forEach((file, index) => {
        const ext = file.name.split('.').pop().toLowerCase();
        const option = document.createElement('option');
        option.value = index;
        option.textContent = file.name;

        if (ext === 'png') pngSelector.appendChild(option);
        else if (ext === 'glb') glbSelector.appendChild(option);
        else if (ext === 'obj') objSelector.appendChild(option);
        else if (ext === 'fbx') fbxSelector.appendChild(option);
        else if (ext === 'stl') stlSelector.appendChild(option);
    });

    document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    currentEditingIndex = -1;
}

function addFileToItem(fileType) {
    // Placeholder for adding files to the item
    console.log('Add ' + fileType + ' file');
}

function saveEditedItem() {
    const title = document.getElementById('editTitle').value;
    const items = document.getElementById('gallery').children;
    if (currentEditingIndex >= 0 && currentEditingIndex < items.length) {
        const titleElement = items[currentEditingIndex].querySelector('.item-title');
        if (titleElement) {
            titleElement.textContent = title;
        }
        items[currentEditingIndex].setAttribute('data-name', title);
    }
    closeEditModal();
}

// Submission handler for suggestions
document.getElementById('submit-suggestion').addEventListener('click', submitSuggestion);
document.getElementById('suggestion-text').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') submitSuggestion();
});

function submitSuggestion() {
    const input = document.getElementById('suggestion-text');
    const text = input.value.trim();

    if (!text) return;

    // Load suggestions from localStorage
    let suggestions = JSON.parse(localStorage.getItem('suggestions')) || [];

    // Add new suggestion
    suggestions.push({
        text: text,
        timestamp: new Date().toLocaleString()
    });

    // Save to localStorage
    localStorage.setItem('suggestions', JSON.stringify(suggestions));

    // Update archive display
    updateSuggestionsArchive();

    // Clear input
    input.value = '';
}

function updateSuggestionsArchive() {
    const archive = document.getElementById('suggestions-archive');
    const suggestions = JSON.parse(localStorage.getItem('suggestions')) || [];

    archive.innerHTML = '';

    if (suggestions.length === 0) {
        archive.innerHTML = '<p style="text-align: center; color: var(--neon-yellow); font-size: 0.7rem;">No suggestions yet.</p>';
        return;
    }

    suggestions.reverse().forEach(suggestion => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';

        const text = document.createElement('div');
        text.className = 'suggestion-text';
        text.textContent = suggestion.text;

        const meta = document.createElement('div');
        meta.className = 'suggestion-meta';
        meta.textContent = suggestion.timestamp;

        item.appendChild(text);
        item.appendChild(meta);
        archive.appendChild(item);
    });
}

// Load suggestions on page load
window.addEventListener('load', updateSuggestionsArchive);

</script>

</body>
</html>
